name: Build Fenda Music APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Adicionar plataforma Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Criar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/fenda-release-key.jks

      - name: Configurar assinatura
        run: |
          cat >> android/gradle.properties << EOF2
          FENDA_STORE_FILE=fenda-release-key.jks
          FENDA_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          FENDA_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          FENDA_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF2

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Build AAB
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Preparar arquivos
        run: |
          mkdir -p dist
          find android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} dist/fenda-music.apk \;
          find android/app/build/outputs/bundle/release/ -name "*.aab" -exec cp {} dist/fenda-music.aab \; || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Fenda-Music-APK
          path: dist/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Fenda-Music-AAB
          path: dist/*.aab
          retention-days: 30
