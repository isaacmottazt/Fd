name: Build Fenda Music APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Adicionar plataforma Android (se não existir)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Dar permissão ao Gradle
        run: chmod +x android/gradlew

      - name: Criar keystore para assinatura
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/fenda-release-key.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Criar gradle.properties com credenciais
        run: |
          cat >> android/gradle.properties << EOF
          FENDA_STORE_FILE=fenda-release-key.jks
          FENDA_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          FENDA_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          FENDA_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Build AAB Release
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Renomear arquivos gerados
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/fenda-music-$(date +%Y%m%d-%H%M).apk || \
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk dist/fenda-music-$(date +%Y%m%d-%H%M)-unsigned.apk
          cp android/app/build/outputs/bundle/release/app-release.aab dist/fenda-music-$(date +%Y%m%d-%H%M).aab || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Fenda-Music-APK
          path: dist/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Fenda-Music-AAB
          path: dist/*.aab
          retention-days: 30

      - name: Criar Release no GitHub (se for tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.apk
            dist/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
